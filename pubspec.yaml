name: ios_music_player
description: Offline music player from YouTube
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  youtube_explode_dart: ^2.2.2
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  path: ^1.9.0
  audioplayers: ^6.1.0
  cached_network_image: ^3.3.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true